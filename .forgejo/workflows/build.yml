name: Build and Push Images

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    if: github.actor == 'ptrlrd'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Buildah and configure storage
        run: |
          apt-get update && apt-get install -y --no-install-recommends buildah fuse-overlayfs
          mkdir -p /etc/containers /var/lib/containers/storage /run/containers/storage
          printf '[storage]\ndriver = "overlay"\nrunroot = "/run/containers/storage"\ngraphroot = "/var/lib/containers/storage"\n\n[storage.options.overlay]\nmount_program = "/usr/bin/fuse-overlayfs"\n' > /etc/containers/storage.conf

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | buildah login -u "${{ secrets.DOCKERHUB_USER }}" --password-stdin docker.io

      - name: Build Image
        run: |
          buildah bud --isolation chroot --format docker --layers \
            --build-arg NEXT_PUBLIC_API_URL= \
            -t ptrlrd/spire-codex-frontend:latest -t ptrlrd/spire-codex-frontend:${{ github.sha }} \
            ./frontend

      - name: Push Image
        run: |
          buildah push ptrlrd/spire-codex-frontend:latest docker://docker.io/ptrlrd/spire-codex-frontend:latest
          buildah push ptrlrd/spire-codex-frontend:${{ github.sha }} docker://docker.io/ptrlrd/spire-codex-frontend:${{ github.sha }}

  build-backend:
    runs-on: ubuntu-latest
    if: github.actor == 'ptrlrd'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Buildah and configure storage
        run: |
          apt-get update && apt-get install -y --no-install-recommends buildah fuse-overlayfs
          mkdir -p /etc/containers /var/lib/containers/storage /run/containers/storage
          printf '[storage]\ndriver = "overlay"\nrunroot = "/run/containers/storage"\ngraphroot = "/var/lib/containers/storage"\n\n[storage.options.overlay]\nmount_program = "/usr/bin/fuse-overlayfs"\n' > /etc/containers/storage.conf

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | buildah login -u "${{ secrets.DOCKERHUB_USER }}" --password-stdin docker.io

      - name: Build Image
        run: |
          buildah bud --isolation chroot --format docker --layers \
            -t ptrlrd/spire-codex-backend:latest -t ptrlrd/spire-codex-backend:${{ github.sha }} \
            ./backend

      - name: Push Image
        run: |
          buildah push ptrlrd/spire-codex-backend:latest docker://docker.io/ptrlrd/spire-codex-backend:latest
          buildah push ptrlrd/spire-codex-backend:${{ github.sha }} docker://docker.io/ptrlrd/spire-codex-backend:${{ github.sha }}
